name: Deploy Bun App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OCI A1 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd pito-buns
            git pull origin main
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun install
            bun run build
            
            # We delete and start to ensure PM2 picks up the 'serve' command
            pm2 delete fambook || true
            pm2 start "bun run serve" --name fambook --host 127.0.0.1 --interpreter $(which bun)
            pm2 save
